        '핵심 메시지 중심 카피라이팅',
        '브랜드 톤에 맞는 문장 정리'
      ],
      image: './img/process-05.jpg',
      point: '보는 순간 이해되는 상태를 만드는 과정입니다.'
    },
    {
      num: '06',
      nav: '디자인 & 인터랙션',
      title: '프리미엄 디자인과 인터랙션을 설계합니다.',
      lead: '디자인은 예쁘게 꾸미는 일이 아니라 신뢰를 느끼게 하는 장치입니다.',
      desc: '브랜드의 무드에 맞는 타이포, 여백, 컬러, 이미지, 시각적 리듬을 정리합니다. 필요할 경우 과하지 않은 인터랙션을 더해 홈페이지 전체의 밀도와 고급감을 높입니다.',
      bullets: [
        '브랜드 무드에 맞는 비주얼 방향 정리',
        '타이포 / 여백 / 시각적 밸런스 설계',
        '필요한 구간에만 절제된 인터랙션 적용'
      ],
      image: './img/process-06.jpg',
      point: '느낌만으로도 신뢰가 생기는 상태를 만듭니다.'
    },
    {
      num: '07',
      nav: '개발 & 구현',
      title: '설계된 구조를 실제 홈페이지로 구현합니다.',
      lead: '기획과 디자인이 흔들리지 않도록 그대로 구현하는 단계입니다.',
      desc: 'PC와 모바일 모두에서 자연스럽게 보이도록 반응형으로 개발하고, 실제 운영 환경에서도 안정적으로 작동할 수 있도록 세부 요소를 정리합니다. 시안이 아니라 실제 자산으로 만드는 과정입니다.',
      bullets: [
        '반응형 퍼블리싱',
        '실제 운영 기준의 구조 구현',
        '브랜드 퀄리티를 해치지 않는 디테일 개발'
      ],
      image: './img/process-07.jpg',
      point: '보여주기용 결과물이 아닌 실제 운영 가능한 결과물로 완성합니다.'
    },
    {
      num: '08',
      nav: '디테일 보정',
      title: '마지막 디테일까지 다듬어 완성합니다.',
      lead: '프리미엄은 큰 차이가 아니라 작은 디테일에서 완성됩니다.',
      desc: '텍스트 흐름, 여백, 리듬, 시선 이동, 모바일 밸런스까지 최종적으로 보정합니다. 처음부터 끝까지 한 호흡으로 읽히고, 브랜드의 품격이 무너지지 않도록 마지막 완성도를 높이는 단계입니다.',
      bullets: [
        '전체 흐름 재점검',
        '시각적 완성도 및 밸런스 보정',
        '최종 납품 전 디테일 정리'
      ],
      image: './img/process-08.jpg',
      point: '수정이 자주 필요한 홈페이지가 아니라 처음부터 완성도 높은 홈페이지를 지향합니다.'
    }
  ];

  var root = document.getElementById('process1');
  if (!root) return;

  var nav = root.querySelector('.jp-nav');
  var navTrack = root.querySelector('.jp-nav-track');
  var content = root.querySelector('.jp-content');
  var jpMain = root.querySelector('.jp-main');

  process1Data.forEach(function(item, i) {
    var navEl = document.createElement('div');
    navEl.className = 'jp-nav-item';
    navEl.setAttribute('data-index', i);
    navEl.setAttribute('data-active', i === 0 ? 'true' : 'false');
    navEl.setAttribute('role', 'button');
    navEl.setAttribute('aria-label', item.num + ' ' + item.nav);
    navEl.setAttribute('tabindex', '0');
    navEl.innerHTML =
      '<span class="jp-nav-num">' + item.num + '.</span>' +
      '<span class="jp-nav-label">' + item.nav + '</span>';
    navTrack.appendChild(navEl);

    var bulletsHtml = '';
    if (item.bullets && item.bullets.length) {
      bulletsHtml = '<ul class="jp-bullets">';
      item.bullets.forEach(function(bullet) {
        bulletsHtml += '<li>' + bullet + '</li>';
      });
      bulletsHtml += '</ul>';
    }

    var imageHtml = '';
    if (item.image) {
      imageHtml =
        '<div class="jp-content-visual">' +
          '<div class="jp-visual-frame">' +
            '<img src="' + item.image + '" alt="' + item.title + ' 이미지" loading="lazy">' +
          '</div>' +
        '</div>';
    } else {
      imageHtml = '<div class="jp-content-visual is-empty"></div>';
    }

    var contentEl = document.createElement('article');
    contentEl.className = 'jp-content-item';
    contentEl.setAttribute('data-index', i);
    contentEl.setAttribute('data-visible', 'false');
    contentEl.setAttribute('aria-label', item.title);
    contentEl.innerHTML =
      '<span class="jp-step-num">STEP ' + item.num + '</span>' +
      '<h3 class="jp-content-title">' + item.title + '</h3>' +
      '<p class="jp-content-lead">' + item.lead + '</p>' +
      '<p class="jp-content-desc">' + item.desc + '</p>' +
      bulletsHtml +
      imageHtml +
      '<div class="jp-point">' + item.point + '</div>';
    content.appendChild(contentEl);
  });

  var navItems = nav.querySelectorAll('.jp-nav-item');
  var contentItems = content.querySelectorAll('.jp-content-item');

  var ticking = false;
  var currentActive = -1;
  var isMobile = false;
  var blockSyntheticClickOnce = false;

  var dragState = {
    isDown: false,
    startX: 0,
    startY: 0,
    startShift: 0,
    currentShift: 0,
    movedEnough: false,
    pointerId: null
  };

  function checkMobile() {
    isMobile = window.innerWidth <= 768;
  }

  function getOffsetTopWithin(ancestor, el) {
    var top = 0;
    var node = el;
    while (node && node !== ancestor) {
      top += node.offsetTop;
      node = node.offsetParent;
    }
    return top;
  }

  function getStopNavTopInMain() {
    var lastItem = contentItems[contentItems.length - 1];
    if (!lastItem) return 0;

    var lastItemBottom = getOffsetTopWithin(jpMain, lastItem) + lastItem.offsetHeight;
    var navHeight = nav.offsetHeight || 0;
    return Math.max(0, lastItemBottom - navHeight);
  }

  function updateFloatingNavState() {
    var viewportH = window.innerHeight;
    var mainRect = jpMain.getBoundingClientRect();

    if (isMobile) {
      var mainInView = mainRect.top < viewportH && mainRect.bottom > 0;
      nav.setAttribute('data-floating', mainInView ? 'true' : 'false');
      nav.setAttribute('data-stopped', 'false');
      nav.style.top = '';
      nav.style.bottom = '0';
      return;
    }

    var navHeight = nav.offsetHeight;
    var fixedNavTopInViewport = (viewportH - navHeight) / 2;
    var currentFixedTopInMain = fixedNavTopInViewport - mainRect.top;
    var stopNavTopInMain = getStopNavTopInMain();

    var isBeforeMain = mainRect.top >= viewportH * 0.3;

    if (isBeforeMain) {
      nav.setAttribute('data-floating', 'false');
      nav.setAttribute('data-stopped', 'false');
      nav.style.top = '';
      return;
    }

    if (currentFixedTopInMain >= stopNavTopInMain) {
      nav.setAttribute('data-floating', 'true');
      nav.setAttribute('data-stopped', 'true');
      nav.style.top = '';
      return;
    }

    nav.setAttribute('data-floating', 'true');
    nav.setAttribute('data-stopped', 'false');
    nav.style.top = '';
  }

  function getMaxShift() {
    var navWidth = nav.clientWidth || window.innerWidth;
    var trackWidth = navTrack.scrollWidth || 0;
    return Math.max(0, trackWidth - navWidth + 36);
  }

  function clampShift(value) {
    var maxShift = getMaxShift();
    if (value < 0) return 0;
    if (value > maxShift) return maxShift;
    return value;
  }

  function applyTrackShift(shift, withTransition) {
    dragState.currentShift = clampShift(shift);

    if (withTransition) {
      navTrack.style.transition = 'transform 0.42s cubic-bezier(0.22, 1, 0.36, 1)';
    } else {
      navTrack.style.transition = 'none';
    }

    navTrack.style.transform = 'translate3d(' + (-dragState.currentShift) + 'px, -50%, 0)';
  }

  function moveActiveItemIntoView(activeIndex, withTransition) {
    if (!isMobile) return;

    var activeItem = navItems[activeIndex];
    if (!activeItem) return;

    var navWidth = nav.clientWidth;
    var itemLeft = activeItem.offsetLeft;
    var itemWidth = activeItem.offsetWidth;

    var target = itemLeft - ((navWidth - itemWidth) / 2);
    target = clampShift(target);

    applyTrackShift(target, withTransition !== false);
  }

  function goToSection(idx) {
    contentItems[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });

    if (isMobile) {
      moveActiveItemIntoView(idx, true);
    }
  }

  function getItemFromPoint(clientX, clientY) {
    var el = document.elementFromPoint(clientX, clientY);
    if (!el) return null;
    return el.closest ? el.closest('#process1 .jp-nav-item') : null;
  }

  function beginDrag(e) {
    dragState.isDown = true;
    dragState.pointerId = e.pointerId || null;
    dragState.startX = e.clientX;
    dragState.startY = e.clientY;
    dragState.startShift = dragState.currentShift;
    dragState.movedEnough = false;
    navTrack.classList.add('jp-dragging');

    try {
      if (dragState.pointerId != null && navTrack.setPointerCapture) {
        navTrack.setPointerCapture(dragState.pointerId);
      }
    } catch (err) {}
  }

  function moveDrag(e) {
    if (!dragState.isDown) return;

    var deltaX = e.clientX - dragState.startX;
    var deltaY = e.clientY - dragState.startY;

    if (Math.abs(deltaX) > 8 && Math.abs(deltaX) > Math.abs(deltaY)) {
      dragState.movedEnough = true;
    }

    if (dragState.movedEnough) {
      var nextShift = dragState.startShift - deltaX;
      applyTrackShift(nextShift, false);
    }
  }

  function endDrag(e) {
    if (!dragState.isDown) return;

    var upTargetItem = getItemFromPoint(e.clientX, e.clientY);

    navTrack.classList.remove('jp-dragging');
    dragState.isDown = false;

    if (dragState.movedEnough) {
      blockSyntheticClickOnce = true;
      return;
    }

    if (upTargetItem) {
      var idx = parseInt(upTargetItem.getAttribute('data-index'), 10);
      if (!isNaN(idx)) {
        goToSection(idx);
      }
    }
  }

  function updateActiveState() {
    var viewportH = window.innerHeight;
    var triggerPoint = viewportH * 0.4;
    var newActive = 0;

    updateFloatingNavState();

    for (var i = 0; i < contentItems.length; i++) {
      var rect = contentItems[i].getBoundingClientRect();
      if (rect.top <= triggerPoint) {
        newActive = i;
      }
    }

    if (newActive !== currentActive) {
      currentActive = newActive;

      for (var j = 0; j < navItems.length; j++) {
        navItems[j].setAttribute('data-active', j === currentActive ? 'true' : 'false');
      }

      if (isMobile && !dragState.isDown) {
        moveActiveItemIntoView(currentActive, true);
      }
    }

    for (var k = 0; k < contentItems.length; k++) {
      var r = contentItems[k].getBoundingClientRect();
      var isVisible = r.top < viewportH * 0.75 && r.bottom > viewportH * 0.15;
      contentItems[k].setAttribute('data-visible', isVisible ? 'true' : 'false');
    }

    ticking = false;
  }

  function onScroll() {
    if (!ticking) {
      requestAnimationFrame(updateActiveState);
      ticking = true;
    }
  }

  function fullRefresh() {
    checkMobile();
    nav.setAttribute('data-stopped', 'false');
    nav.setAttribute('data-floating', 'false');
    nav.style.top = '';

    if (!isMobile) {
      navTrack.style.transition = '';
      navTrack.style.transform = '';
    } else {
      moveActiveItemIntoView(currentActive >= 0 ? currentActive : 0, false);
    }

    requestAnimationFrame(updateActiveState);
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', fullRefresh, { passive: true });
  window.addEventListener('load', fullRefresh);

  navTrack.addEventListener('pointerdown', function(e) {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    beginDrag(e);
  });

  navTrack.addEventListener('pointermove', function(e) {
    moveDrag(e);
  });

  navTrack.addEventListener('pointerup', function(e) {
    endDrag(e);
  });

  navTrack.addEventListener('pointercancel', function() {
    if (!dragState.isDown) return;
    navTrack.classList.remove('jp-dragging');
    dragState.isDown = false;
  });

  navTrack.addEventListener('lostpointercapture', function() {
    if (dragState.isDown) {
      navTrack.classList.remove('jp-dragging');
      dragState.isDown = false;
    }
  });

  navItems.forEach(function(navItem, idx) {
    navItem.addEventListener('click', function(e) {
      if (blockSyntheticClickOnce) {
        e.preventDefault();
        e.stopPropagation();
        blockSyntheticClickOnce = false;
        return;
      }
      goToSection(idx);
    });

    navItem.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        goToSection(idx);
      }
    });
  });

  requestAnimationFrame(fullRefresh);
})();
</script>
